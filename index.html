<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرید سرویس استارلینک</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🛒 خرید سرویس استارلینک</h1>
        <p class="subtitle">پلن مورد نظر خود را انتخاب کنید</p>
        
        <div class="plans">
            <div class="plan-card" data-plan="1">
                <h2>۱ گیگ</h2>
                <p class="price">۲۸۹ هزار تومان</p>
                <button class="buy-btn green">انتخاب پلن</button>
            </div>
            
            <div class="plan-card" data-plan="2">
                <h2>۲ گیگ</h2>
                <p class="price">۵۷۸ هزار تومان</p>
                <button class="buy-btn green">انتخاب پلن</button>
            </div>
            
            <div class="plan-card" data-plan="5">
                <h2>۵ گیگ</h2>
                <p class="price">۱,۴۴۵ هزار تومان</p>
                <button class="buy-btn green">انتخاب پلن</button>
            </div>
            
            <div class="plan-card" data-plan="10">
                <h2>۱۰ گیگ</h2>
                <p class="price">۲,۸۹۰ هزار تومان</p>
                <button class="buy-btn green">انتخاب پلن</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
